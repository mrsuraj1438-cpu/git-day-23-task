<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Branch Changes</title>

<style>
    body{
        margin:0;
        padding:0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg,#667eea,#764ba2);
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
    }

    .card{
        background:white;
        padding:40px;
        border-radius:12px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        width:400px;
        text-align:center;
    }

    h1{
        color:#333;
        margin-bottom:20px;
    }

    .master{
        background:#e3f2fd;
        padding:10px;
        border-radius:6px;
        margin-bottom:10px;
        color:#0d47a1;
        font-weight:bold;
    }

    .dev{
        background:#e8f5e9;
        padding:10px;
        border-radius:6px;
        color:#1b5e20;
        font-weight:bold;
    }
</style>

</head>
<body>

<div class="card">
    <h1>This is New Heading</h1>

    <div class="master">
        Line 2: Master Branch Change
    </div>

    <div class="dev">
        This is my change (Dev Branch)
    </div>
</div>

</body>
</html>
